    // Faction + tile + event data (identical to JSX artifact)
    const FACTIONS=[{id:"arborec",name:"The Arborec",color:"#4a7c3f",tagline:"Living Forest of War",ability:"Mitosis: At the start of the status phase, place 1 infantry on any planet you control.",startingUnits:"1 Carrier, 1 Cruiser, 2 Fighters, 4 Infantry, 1 PDS, 1 Space Dock",startingTech:"Magen Defense Grid",homeSystem:"Nestphar (3/2)",commodities:3,promissory:"Stymie: Place this card face-up in your play area when another player moves ships into a system that contains 1 or more of your ships.",flagshipName:"Duha Menaimon",flagshipStats:"Cost 8 | Combat 7(×2) | Move 1 | Capacity 5 — After you activate this system, you may produce up to 5 units in this system.",mechName:"Letani Behemoth",mechAbility:"After this unit is destroyed, roll 1 die; on 6+, place the unit on this card. At the start of your next turn, place it on a planet you control.",lore:"The Arborec are a vast sentient plant network spanning entire worlds. Each 'individual' is merely a node in a planetary consciousness that dreams in centuries and wages war with the patience of geology.",strengths:"Strong ground game, self-sustaining infantry production, excellent at holding territory",weaknesses:"Slow expansion, limited starting fleet, poor early game mobility",complexity:2},{id:"letnev",name:"The Barony of Letnev",color:"#8b1a1a",tagline:"Military Industrial Machine",ability:"Munitions Reserves: At the start of each round of space combat, you may spend 2 trade goods to re-roll any number of your dice.",startingUnits:"1 Dreadnought, 1 Carrier, 1 Destroyer, 1 Fighter, 3 Infantry, 1 Space Dock",startingTech:"Antimass Deflectors, Plasma Scoring",homeSystem:"Arc Prime (4/0), Wren Terra (2/1)",commodities:2,promissory:"War Funding: After a player's destroyer or cruiser is destroyed, you may place 1 of your destroyers from your reinforcements in that system's space area.",flagshipName:"Arc Secundus",flagshipStats:"Cost 8 | Combat 5(×2) | Move 1 | Capacity 3 — Other players' units in this system lose PLANETARY SHIELD.",mechName:"Dunlain Reaper",mechAbility:"During combat against a player who has the most victory points, apply +2 to the result of each of this unit's combat rolls.",lore:"Beneath the frozen surface of Arc Prime, the Barony forges the mightiest warfleet the galaxy has ever known. Their society is built on military service and industrial might, ruled by a ruthless aristocracy.",strengths:"Powerful combat rerolls, strong starting tech, versatile military",weaknesses:"Low commodities, trade-good hungry, needs economy to fuel war machine",complexity:1},{id:"saar",name:"The Clan of Saar",color:"#c4a23a",tagline:"Nomadic Scavengers",ability:"Scavenge: After you gain control of a planet, gain 1 trade good.",startingUnits:"2 Carriers, 1 Cruiser, 2 Fighters, 4 Infantry, 1 Space Dock",startingTech:"Antimass Deflectors",homeSystem:"Lisis II (1/0), Ragh (2/1)",commodities:3,promissory:"Ragh's Call: After you commit 1 or more units to a planet, the active player places 1 infantry from their reinforcements on that planet.",flagshipName:"Son of Ragh",flagshipStats:"Cost 8 | Combat 5(×2) | Move 1 | Capacity 3 — ANTI-FIGHTER BARRAGE 6 (×4)",mechName:"Scavenger Zeta",mechAbility:"After you gain control of a planet, you may place 1 mech on that planet from your reinforcements.",lore:"Displaced from their homeworld by cosmic catastrophe, the Clan of Saar wanders the stars in great migrant fleets. They are survivalists and scavengers, finding wealth where others see only ruins.",strengths:"Mobile space docks, excellent early expansion, free trade goods from conquering",weaknesses:"Vulnerable home system, hard to defend wide territory, reliant on momentum",complexity:2},{id:"hacan",name:"The Emirates of Hacan",color:"#d4a017",tagline:"Masters of Trade",ability:"Masters of Trade: You do not have to spend a command token to resolve the secondary ability of the 'Trade' strategy card.",startingUnits:"2 Carriers, 1 Cruiser, 2 Fighters, 4 Infantry, 1 Space Dock",startingTech:"Antimass Deflectors, Sarween Tools",homeSystem:"Arretze (2/0), Hercant (1/1), Kamdorn (0/1)",commodities:6,promissory:"Trade Convoys: Lock/unlock this card to establish trade agreements with any number of players.",flagshipName:"Wrath of Kenara",flagshipStats:"Cost 8 | Combat 7(×2) | Move 1 | Capacity 3 — After you win a space combat, gain 3 trade goods.",mechName:"Pride of Kenara",mechAbility:"During combat, you may spend 2 trade goods; if you do, apply +2 to the result of each of this unit's combat rolls.",lore:"The Emirates of Hacan control the galaxy's largest trading network from their desert homeworlds. Their wealth is legendary, and their trade caravans connect even the most distant systems.",strengths:"Massive economy, 6 commodities, flexible trade, strong starting tech",weaknesses:"Average military, can become a target for their wealth, rely on diplomacy",complexity:1},{id:"sol",name:"The Federation of Sol",color:"#2e5cb8",tagline:"Humanity United",ability:"Orbital Drop: As an action, spend 1 command token from your reinforcements to place 2 infantry on any planet you control.",startingUnits:"2 Carriers, 1 Destroyer, 5 Infantry, 1 Space Dock",startingTech:"Antimass Deflectors, Neural Motivator",homeSystem:"Jord (4/2)",commodities:4,promissory:"Military Support: At the start of the Sol player's turn, they may remove this card to place 2 infantry on any planet they control.",flagshipName:"Genesis",flagshipStats:"Cost 8 | Combat 5(×2) | Move 1 | Capacity 12 — At the end of the status phase, place 1 infantry from your reinforcements on this ship.",mechName:"ZS Thunderbolt M2",mechAbility:"After a player activates this system, you may spend 1 token from your tactics pool; if you do, place this mech on a planet you control in this system.",lore:"Humanity has united under the banner of Sol, forging an interstellar federation of incredible ambition. What they lack in alien gifts, they make up for in numbers, adaptability, and sheer determination.",strengths:"Infantry spam, ce the Naalu '0' token on your strategy card. You are first in initiative order.",startingUnits:"1 Carrier, 1 Cruiser, 1 Destroyer, 3 Fighters, 4 Infantry, 1 PDS, 1 Space Dock",startingTech:"Neural Motivator, Sarween Tools",homeSystem:"Druaa (3/1), Maaluuk (0/2)",commodities:3,promissory:"Gift of Prescience: At the end of the strategy phase, the Naalu player places the Naalu '0' token on your strategy card instead of theirs.",flagshipName:"Matriarch",flagshipStats:"Cost 8 | Combat 9(×2) | Move 1 | Capacity 6 — During an invasion in this system, you may commit fighters to planets as if they were ground forces.",mechName:"Iconoclast",mechAbility:"During combat, apply +2 to the result of each of this unit's combat rolls if your opponent is the active player.",lore:"The Naalu are an ancient serpentine race with powerful telepathic abilities. They always act first, their prescient minds seeing the threads of fate before others even begin to move.",strengths:"Always go first (0 initiative), fighters as ground forces, strong starting tech",weaknesses:"Average combat stats, token-hungry, need to leverage initiative advantage",complexity:2},{id:"nekro",name:"The Nekro Virus",color:"#1a1a2e",tagline:"Technological Plague",ability:"Technological Singularity: You cannot research technology. When you win a combat, copy 1 technology from your opponent.",startingUnits:"1 Dreadnought, 1 Carrier, 2 Fighters, 2 Infantry, 1 Space Dock",startingTech:"Daxcive Animators",homeSystem:"Mordai II (4/0)",commodities:3,promissory:"Antivirus: When the Nekro player gains control of a planet you control, they cannot use TECHNOLOGICAL SINGULARITY against you this combat.",flagshipName:"The Alastor",flagshipStats:"Cost 8 | Combat 9(×2) | Move 1 | Capacity 3 — At the start of a space combat, choose any number of your ground forces on planets in this system to participate as if they were ships.",mechName:"Mordred",mechAbility:"During combat, when your opponent produces a hit, you may remove this unit to cancel that hit.",lore:"The Nekro Virus is not a civilization but a technological pathogen that has achieved sentience. It consumes and assimilates all technology it encounters, growing stronger with each conquest.",strengths:"Free tech from combat, powerful flagship, can snowball quickly",weaknesses:"Cannot research, must fight to gain tech, universally feared/targeted",complexity:3},{id:"sardakk",name:"Sardakk N'orr",color:"#8b0000",tagline:"Warrior Hive",ability:"Unrelenting: Apply +1 to the result of each of your unit's combat rolls.",startingUnits:"2 Carriers, 1 Cruiser, 5 Infantry, 1 PDS, 1 Space Dock",startingTech:"None",homeSystem:"Tren'lak (1/0), Quinarra (3/1)",commodities:3,promissory:"Tekklar Legion: At the start of an invasion combat, apply +1 to each of the Sardakk player's combat rolls for the duration of the combat.",flagshipName:"C'Morran N'orr",flagshipStats:"Cost 8 | Combat 6(×2) | Move 1 | Capacity 3 — Apply +1 to the result of each of your other ships' combat rolls in this system.",mechName:"Valkyrie Exoskeleton",mechAbility:"After this unit is destroyed, roll 1 die; on 6+, your opponent must destroy 1 of their non-fighter ships in this system.",lore:"The N'orr are an insectoid warrior species for whom combat is religion. Every N'orr is a soldier, every hive a fortress. They are the galaxy's most feared ground forces.",strengths:"Best combat modifier in game (+1 to everything), fearsome in battle",weaknesses:"No starting tech, slow development, must invest heavily in tech",complexity:2},{id:"jolnar",name:"The Universities of Jol-Nar",color:"#1c6ea4",tagline:"Galactic Scholars",ability:"Fragile: Apply -1 to the result of each of your unit's combat rolls.",startingUnits:"2 Carriers, 1 Dreadnought, 1 Fighter, 2 Infantry, 1 PDS, 1 Space Dock",startingTech:"Antimass Deflectors, Neural Motivator, Sarween Tools, Plasma Scoring",homeSystem:"Jol (1/2), Nar (2/3)",commodities:4,promissory:"Research Agreement: After the Jol-Nar player researches a technology, you may exhaust this card to research the same technology.",flagshipName:"J.N.S. Hylarim",flagshipStats:"Cost 8 | Combat 6(×2) | Move 1 | Capacity 3 — When making a combat roll for this ship, each result of 9 or 10, before applying modifiers, produces 2 additional hits.",mechName:"Shield Bearer",mechAbility:"When you use SPACE CANNON against ships that are in the active system, your PDS in this system each roll 1 additional die.",lore:"The Universities of Jol-Nar are the galaxy's preeminent center of learning. Their scholars have unlocked secrets of the cosmos that other races can barely comprehend, but their physical frailty is legendary.",strengths:"4 starting techs (most in game), fastest tech progression, research power",weaknesses:"-1 to all combat rolls, fragile military, tempting target for tech theft",complexity:2},{id:"winnu",name:"The Winnu",color:"#a08040",tagline:"Custodians of Mecatol",ability:"Blood Ties: You do not have to spend influence to remove the custodians token from Mecatol Rex.",startingUnits:"1 Carrier, 1 Cruiser, 2 Fighters, 2 Infantry, 1 PDS, 1 Space Dock",startingTech:"Choose any 1 technology with no prerequisites",homeSystem:"Winnu (3/4)",commodities:3,promissory:"Acquiescence: After the Winnu player resolves a tactical action in a system that contains a planet they control, you may spend 1 token.",flagshipName:"Salai Sai Corian",flagshipStats:"Cost 8 | Combat 7(×2) | Move 1 | Capacity 3 — When this unit makes a combat roll, it rolls a number of dice equal to the number of your non-fighter ships in this system.",mechName:"Reclaimer",mechAbility:"After this unit is destroyed, you may place 1 PDS from your reinforcements on the planet that contains this unit.",lore:"The Winnu are the former custodians of the imperial throne on Mecatol Rex. They believe it is their divine right to reclaim the seat of power and restore the galactic council.",strengths:"Free Mecatol Rex claim, flexible starting tech, excellent home system",weaknesses: alaxy.",strengths:"Three unique agents, upgradeable flagship, versatile toolkit",weaknesses:"Complex decision trees, moderate economy, agents require mastery",complexity:3},{id:"mahact",name:"The Mahact Gene-Sorcerers",color:"#9b30ff",tagline:"Genetic Warlords",ability:"Edict: When you win a combat, place 1 of your opponent's command tokens from their reinforcements on your sheet as a 'captured' token.",startingUnits:"2 Carriers, 1 Dreadnought, 2 Fighters, 3 Infantry, 1 Space Dock",startingTech:"Bio-Stims, Predictive Intelligence",homeSystem:"Ixth (3/5)",commodities:3,promissory:"Scepter of Dominion: When the Mahact player would use a captured commander ability, they must first return 1 captured token.",flagshipName:"Arvicon Rex",flagshipStats:"Cost 8 | Combat 5(×2) | Move 1 | Capacity 3 — During combat, opposing ships in this system cannot use SUSTAIN DAMAGE.",mechName:"Starlancer",mechAbility:"After a player whose command token is in your fleet pool activates a system, you may spend their token to end their turn; then you may move this unit.",lore:"The Mahact were the terrifying gene-sorcerers who once controlled the galaxy through biological manipulation. Their return from exile threatens to plunge the galaxy into a new age of genetic tyranny.",strengths:"Steal command tokens, use enemy commanders, powerful disruption",weaknesses:"Universally feared/hated, must fight to use abilities, complex",complexity:3},{id:"naazrokha",name:"The Naaz-Rokha Alliance",color:"#6b8e23",tagline:"Mech Warriors",ability:"Fabricators: When you explore a planet, you may spend 1 trade good to place 1 mech on that planet.",startingUnits:"1 Carrier, 1 Cruiser, 1 Destroyer, 2 Fighters, 3 Infantry, 1 Mech, 1 Space Dock",startingTech:"AI Development Algorithm, Psychoarchaeology",homeSystem:"Nar (2/3), Rokha (1/2)",commodities:3,promissory:"Black Market Forgery: After the Naaz-Rokha player resolves an exploration card, you may place 1 mech from the Naaz-Rokha player's reinforcements on that           ),
          React.createElement("span",{style:{padding:"3px 10px",borderRadius:6,fontSize:10,fontFamily:"'Rajdhani', sans-serif",letterSpacing:1,textTransform:"uppercase",background:`${SEVERITY_COLORS[event.severity]}18`,color:SEVERITY_COLORS[event.severity],border:`1px solid ${SEVERITY_COLORS[event.severity]}33`}},event.severity)
        ),
        React.createElement("div",{style:{fontFamily:"'Rajdhani', sans-serif",fontSize:14,color:"#cbd5e1",lineHeight:1.6}},event.desc)
      );
    }

    function App(){
      const[playerCount,setPlayerCount]=useState(6);
      const[slices,setSlices]=useState([]);
      const[factionPool,setFactionPool]=useState([]);
      const[draftedFactions,setDraftedFactions]=useState({});
      const[events,setEvents]=useState([]);
      const[selectedFaction,setSelectedFaction]=useState(null);
      const[activeTab,setActiveTab]=useState("slices");
      const[draftStarted,setDraftStarted]=useState(false);
      const[currentDraftPlayer,setCurrentDraftPlayer]=useState(1);

      const generateDraft=useCallback(()=>{
        const available=shuffle(SYSTEM_TILES);const newSlices=[];const used=new Set();
        for(let i=0;i<playerCount+1;i++){const pool=available.filter(t=>!used.has(t.id));const slice=generateSlice(pool,i);slice.tiles.forEach(t=>used.add(t.id));newSlices.push(slice);}
        setSlices(newSlices);
        const pool=shuffle(FACTIONS).slice(0,Math.min(playerCount+3,FACTIONS.length));
        setFactionPool(pool);setDraftedFactions({});setCurrentDraftPlayer(1);setDraftStarted(true);
        setEvents(shuffle(GALACTIC_EVENTS).slice(0,3));setActiveTab("slices");
      },[playerCount]);

      const draftFaction=(faction)=>{if(draftedFactions[faction.id])return;setDraftedFactions(prev=>({...prev,[faction.id]:`P${currentDraftPlayer}`}));setCurrentDraftPlayer(prev=>prev<playerCount?prev+1:prev);};
      const rollNewEvents=()=>setEvents(shuffle(GALACTIC_EVENTS).slice(0,3));
      const tabs=[{id:"slices",label:"Map Slices",icon:"⬡"},{id:"factions",label:"Faction Pool",icon:"⚔"},{id:"events",label:"Galactic Events",icon:"🌌"},{id:"all",label:"All Factions",icon:"📖"}];

      return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(170deg, #030712 0%, #0c0a1e 30%, #0a0f1f 60%, #050a14 100%)",color:"#e2e8f0",position:"relative",fontFamily:"'Rajdhani', sans-serif"}},
        React.createElement(StarField),
        React.createElement("div",{style:{position:"relative",zIndex:10,padding:"36px 32px 0",textAlign:"center"}},
          React.createElement("div",{style:{fontFamily:"'Rajdhani', sans-serif",fontSize:11,letterSpacing:6,color:"#64748b",textTransform:"uppercase",marginBottom:8}},"Twilight Imperium IV"),
          React.createElement("h1",{style:{fontFamily:"'Cinzel', serif",fontSize:42,fontWeight:700,margin:0,background:"linear-gradient(135deg, #fbbf24, #f59e0b, #d97706)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}},"MILTY DRAFT"),
          React.createElement("div",{style:{fontFamily:"'Rajdhani', sans-serif",fontSize:14,color:"#475569",marginTop:4,letterSpacing:2}},"SLICE GENERATOR • FACTION POOL • GALACTIC EVENTS")
        ),
        React.createElement("div",{style:{position:"relative",zIndex:10,padding:"24px 32px",display:"flex",justifyContent:"center",gap:16,flexWrap:"wrap",alignItems:"center"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
            React.createElement("label",{style:{fontSize:13,color:"#94a3b8",letterSpacing:1}},"PLAYERS"),
            React.createElement("div",{style:{display:"flex",gap:4}},
              [3,4,5,6,7,8].map(n=>React.createElement("button",{key:n,onClick:()=>setPlayerCount(n),style:{width:36,height:36,borderRadius:8,border:"1px solid",borderColor:playerCount===n?"#f59e0b":"rgba(255,255,255,0.1)",background:playerCount===n?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.04)",color:playerCount===n?"#fbbf24":"#94a3b8",cursor:"pointer",fontFamily:"'Rajdhani', sans-serif",fontSize:15,fontWeight:600,transition:"all 0.15s"}},n))
            )
          ),
          React.createElement("button",{onClick:generateDraft,style:{padding:"10px 28px",borderRadius:10,border:"1px solid #f59e0b55",background:"linear-gradient(135deg, rgba(245,158,11,0.18), rgba(217,119,6,0.12))",color:"#fbbf24",fontFamily:"'Cinzel', serif",fontSize:15,fontWeight:600,cursor:"pointer",letterSpacing:1,transition:"all 0.2s"}},draftStarted?"⟳ Regenerate Draft":"✦ Generate Draft")
        ),
        draftStarted&&React.createElement("div",{style:{position:"relative",zIndex:10,padding:"0 32px",display:"flex",justifyContent:"center",gap:4,flexWrap:"wrap"}},
          tabs.map(tab=>React.createElement("button",{key:tab.id,onClick:()=>setActiveTab(tab.id),style:{padding:"10px 20px",borderRadius:"10px 10px 0 0",border:"1px solid",borderBottom:"none",borderColor:activeTab===tab.id?"rgba(255,255,255,0.15)":"transparent",background:activeTab===tab.id?"rgba(255,255,255,0.06)":"transparent",color:activeTab===tab.id?"#f1f5f9":"#64748b",fontFamily:"'Rajdhani', sans-serif",fontSize:13,fontWeight:600,letterSpacing:1,cursor:"pointer",transition:"all 0.15s"}},React.createElement("span",{style:{marginRight:6}},tab.icon),tab.label))
        ),
        draftStarted&&React.createElement("div",{style:{position:"relative",zIndex:10,margin:"0 32px 32px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"0 14px 14px 14px",padding:24,minHeight:300,animation:"slideUp 0.3s ease-out"}},
          activeTab==="slices"&&React.createElement("div",null,
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
              React.createElement("div",{style:{fontFamily:"'Cinzel', serif",fontSize:20,color:"#f1f5f9"}},"Map Slices ",React.createElement("span",{style:{fontSize:13,color:"#64748b",fontFamily:"'Rajdhani', sans-serif"}},"("+slices.length+" generated for "+playerCount+" players)"))
            ),
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))",gap:16}},slices.map((s,i)=>React.createElement(SliceCard,{key:s.id,slice:s,index:i})))
          ),
          activeTab==="factions"&&React.createElement("div",null,
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:12}},
              React.createElement("div",{style:{fontFamily:"'Cinzel', serif",fontSize:20,color:"#f1f5f9"}},"Faction Pool ",React.createElement("span",{style:{fontSize:13,color:"#64748b",fontFamily:"'Rajdhani', sans-serif"}},"("+factionPool.length+" factions — click to view, draft button below)")),
              React.createElement("div",{style:{padding:"6px 14px",borderRadius:8,background:"rgba(59,130,246,0.12)",border:"1px solid rgba(59,130,246,0.3)",fontFamily:"'Rajdhani', sans-serif",fontSize:13,color:"#60a5fa"}},"Now Drafting: Player "+currentDraftPlayer+" of "+playerCount)
            ),
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",gap:12}},
              factionPool.map(f=>React.createElement("div",{key:f.id,style:{position:"relative"}},
                React.createElement(FactionCard,{faction:f,onClick:()=>setSelectedFaction(f),drafted:!!draftedFactions[f.id],draftedBy:draftedFactions[f.id]}),
                !draftedFactions[f.id]&&React.createElement("button",{onClick:e=>{e.stopPropagation();draftFaction(f);},style:{position:"absolute",bottom:10,right:10,padding:"4px 12px",borderRadius:6,background:"rgba(74,222,128,0.15)",border:"1px solid rgba(74,222,128,0.3)",color:"#4ade80",fontSize:10,fontFamily:"'Rajdhani', sans-serif",letterSpacing:1,cursor:"pointer",textTransform:"uppercase"}},"Draft")
              ))
            )
          ),
          activeTab==="events"&&React.createElement("div",null,
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:12}},
              React.createElement("div",{style:{fontFamily:"'Cinzel', serif",fontSize:20,color:"#f1f5f9"}},"Galactic Events"),
              React.createElement("button",{onClick:rollNewEvents,style:{padding:"8px 18px",borderRadius:8,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.12)",color:"#a78bfa",fontFamily:"'Rajdhani', sans-serif",fontSize:13,cursor:"pointer",letterSpacing:1}},"⟳ Roll New Events")
            ),
            React.createElement("div",{style:{display:"grid",gap:14}},events.map((e,i)=>React.createElement(EventCard,{key:i,event:e})))
          ),
          activeTab==="all"&&React.createElement("div",null,
            React.createElement("div",{style:{fontFamily:"'Cinzel', serif",fontSize:20,color:"#f1f5f9",marginBottom:18}},"All Factions Reference ",React.createElement("span",{style:{fontSize:13,color:"#64748b",fontFamily:"'Rajdhani', sans-serif"}},"(click any for details)")),
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",gap:10}},FACTIONS.map(f=>React.createElement(FactionCard,{key:f.id,faction:f,onClick:()=>setSelectedFaction(f)})))
          )
        ),
        !draftStarted&&React.createElement("div",{style:{position:"relative",zIndex:10,textAlign:"center",padding:"60px 32px",animation:"pulse 3s ease-in-out infinite"}},
          React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⬡"),
          React.createElement("div",{style:{fontFamily:"'Cinzel', serif",fontSize:18,color:"#475569"}},"Select player count and generate your draft")
        ),
        React.createElement(FactionModal,{faction:selectedFaction,onClose:()=>setSelectedFaction(null)})
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
